<div style="text-align: center; margin: 20px 0; font-family: serif; font-style: italic; font-size: 1.5em; color: var(--primary);">
    "The Journey is the Reward"
    <div style="font-size: 0.6em; font-style: normal; margin-top: 5px; opacity: 0.8;">— Steve Jobs</div>
</div>

<div class="lm-modes">
    <button id="lm-mode-browse" type="button" class="lm-mode lm-mode-active">📍 Browse photos</button>
    <button id="lm-mode-guess" type="button" class="lm-mode">🎯 Guess where</button>
    <span class="lm-hint" id="lm-hint">Pick a mode</span>
</div>

<div class="lm-wrap">
    <div id="life-map"></div>

    <div id="geo-panel" class="geo-panel" style="display: none;">
        <div class="geo-photo-wrap">
            <img id="geo-photo" class="is-empty" alt="Where was this taken?" referrerpolicy="no-referrer">
        </div>
        <div class="geo-info">
            <span><strong id="geo-round-label">Round 1 / 5</strong></span>
            <span class="geo-score-label">Total: <strong id="geo-total-score">0</strong> pts</span>
        </div>
        <div class="geo-actions">
            <button id="geo-skip" type="button" class="geo-secondary">Skip</button>
            <button id="geo-confirm" type="button" style="display: none;">Confirm guess</button>
            <button id="geo-next" type="button" style="display: none;">Next round →</button>
        </div>
        <div id="geo-result" class="geo-result" style="display: none;"></div>
        <p class="geo-instructions" id="geo-instructions">Click anywhere on the map to place your guess.</p>
    </div>

    <div id="geo-end" class="geo-end" style="display: none;">
        <div class="geo-end-card">
            <h3>Game over</h3>
            <p>Total score: <strong id="geo-final-score">0</strong> / 25,000</p>
            <p class="geo-final-breakdown" id="geo-final-breakdown"></p>
            <div class="geo-end-row">
                <input id="geo-name" type="text" maxlength="20" placeholder="Your name for the leaderboard" autocomplete="off">
                <button id="geo-save" type="button">Save</button>
            </div>
            <p class="geo-save-status" id="geo-save-status"></p>
            <div class="geo-leaderboard">
                <h4>Global leaderboard <span class="geo-lb-hint" id="geo-lb-meta">(loading…)</span></h4>
                <ol id="geo-lb-list"></ol>
            </div>
            <div class="geo-end-actions">
                <button id="geo-restart" type="button">Play again</button>
                <button id="geo-quit" type="button" class="geo-secondary">Back to browse</button>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
    // ── Map setup (browse mode) ───────────────────────────
    var map = L.map('life-map').setView([30, 30], 2);
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
    }).addTo(map);

    var allPoints = [];
    var browseCluster = null;
    var dataReady = false;
    var hintEl = document.getElementById('lm-hint');
    hintEl.textContent = 'Loading photos…';

    fetch('/data/life_points.json')
        .then(r => r.json())
        .then(points => {
            allPoints = points;
            browseCluster = L.markerClusterGroup();
            points.forEach(point => {
                var marker = L.marker([point.lat, point.lng]);
                var popupContent =
                    '<div style="text-align: center; min-width: 300px;">' +
                        '<b style="font-size: 1.2em; display:block; margin-bottom:8px;">' + point.title + '</b>' +
                        '<div style="width: 100%; max-height: 500px; overflow: hidden; border-radius: 8px;">' +
                            '<img src="' + point.img + '" style="width: 100%; height: auto; object-fit: cover;" loading="lazy">' +
                        '</div>' +
                    '</div>';
                marker.bindPopup(popupContent, { maxWidth: 500, minWidth: 300 });
                marker.on('mouseover', function () { this.openPopup(); });
                browseCluster.addLayer(marker);
            });
            map.addLayer(browseCluster);
            if (points.length > 0) map.fitBounds(browseCluster.getBounds().pad(0.1));
            dataReady = true;
            hintEl.textContent = points.length + ' photos · pick a mode';
        })
        .catch(err => {
            console.error('Error loading map data:', err);
            hintEl.textContent = 'Failed to load photos.';
        });

    // ── Geoguess state ────────────────────────────────────
    var ROUNDS = 5;
    var EARTH_RADIUS_KM = 6371;
    var SCORE_SCALE_KM = 2000;   // exp(-d/2000) → 5000 max

    var game = null;             // { round, scores: [], history: [{photo, guess, distanceKm, score}], state: 'guessing'|'revealed' }
    var truthMarker = null;
    var guessMarker = null;
    var connector = null;
    var GEO_API = 'https://match.junren.li';
    var savedScoreId = null;     // id returned by /geo/score after a save (used to highlight)

    function haversineKm(a, b) {
        const toRad = (x) => x * Math.PI / 180;
        const dLat = toRad(b.lat - a.lat);
        const dLng = toRad(b.lng - a.lng);
        const lat1 = toRad(a.lat), lat2 = toRad(b.lat);
        const h = Math.sin(dLat/2)**2 + Math.cos(lat1)*Math.cos(lat2)*Math.sin(dLng/2)**2;
        return 2 * EARTH_RADIUS_KM * Math.asin(Math.min(1, Math.sqrt(h)));
    }

    function scoreFromDistance(d) {
        return Math.round(5000 * Math.exp(-d / SCORE_SCALE_KM));
    }

    function pinIcon(kind) {
        return L.divIcon({
            className: 'geo-pin geo-pin-' + kind,
            html: '<div class="geo-pin-dot"></div>',
            iconSize: [18, 18],
            iconAnchor: [9, 9],
        });
    }

    function clearRoundMarkers() {
        if (truthMarker) { map.removeLayer(truthMarker); truthMarker = null; }
        if (guessMarker) { map.removeLayer(guessMarker); guessMarker = null; }
        if (connector)   { map.removeLayer(connector);   connector = null; }
    }

    function getPanel() { return document.getElementById('geo-panel'); }
    function getEnd()   { return document.getElementById('geo-end'); }

    function setMode(m) {
        if (m === 'browse') {
            document.getElementById('lm-mode-browse').classList.add('lm-mode-active');
            document.getElementById('lm-mode-guess').classList.remove('lm-mode-active');
            if (browseCluster && !map.hasLayer(browseCluster)) map.addLayer(browseCluster);
            clearRoundMarkers();
            getPanel().style.display = 'none';
            getEnd().style.display = 'none';
            game = null;
            if (dataReady) hintEl.textContent = allPoints.length + ' photos · drag, zoom, click pins';
        } else {
            if (!dataReady) { hintEl.textContent = 'Still loading…'; return; }
            document.getElementById('lm-mode-guess').classList.add('lm-mode-active');
            document.getElementById('lm-mode-browse').classList.remove('lm-mode-active');
            if (browseCluster && map.hasLayer(browseCluster)) map.removeLayer(browseCluster);
            startGame();
        }
    }

    function startGame() {
        game = { round: 0, history: [], state: 'guessing' };
        getEnd().style.display = 'none';
        getPanel().style.display = 'block';
        nextPhoto();
    }

    function pickRandomPhoto() {
        return allPoints[Math.floor(Math.random() * allPoints.length)];
    }

    function nextPhoto() {
        clearRoundMarkers();
        game.round += 1;
        game.state = 'guessing';
        var photo = pickRandomPhoto();
        game.currentPhoto = photo;

        document.getElementById('geo-round-label').textContent = 'Round ' + game.round + ' / ' + ROUNDS;
        document.getElementById('geo-total-score').textContent =
            game.history.reduce((s, h) => s + h.score, 0).toLocaleString();
        document.getElementById('geo-result').style.display = 'none';
        document.getElementById('geo-result').innerHTML = '';
        document.getElementById('geo-next').style.display = 'none';
        document.getElementById('geo-confirm').style.display = 'none';
        document.getElementById('geo-skip').disabled = false;
        document.getElementById('geo-instructions').textContent = 'Click anywhere on the map to place your guess.';
        game.pendingGuess = null;
        var img = document.getElementById('geo-photo');
        // Hide the previous photo immediately so we don't flash it while loading the next one.
        img.classList.remove('is-empty');
        img.classList.add('is-loading');
        img.onload  = function () { img.classList.remove('is-loading'); };
        img.onerror = function () { img.classList.remove('is-loading'); };
        img.src = photo.img;
        img.alt = 'Round ' + game.round + ' photo';

        // Reset map to neutral world view
        map.setView([20, 20], 1);
    }

    function revealRound(guessLatLng) {
        if (!game || (game.state !== 'guessing' && game.state !== 'placed')) return;
        var photo = game.currentPhoto;
        var truthLL = { lat: photo.lat, lng: photo.lng };
        var score, distanceKm;
        if (guessLatLng) {
            distanceKm = haversineKm(guessLatLng, truthLL);
            score = scoreFromDistance(distanceKm);
            // Reuse the marker that was placed during the 'placed' phase, or create one for skip-with-guess edge cases.
            if (!guessMarker) {
                guessMarker = L.marker([guessLatLng.lat, guessLatLng.lng], { icon: pinIcon('guess') })
                              .bindTooltip('Your guess', {permanent: false}).addTo(map);
            }
        } else {
            distanceKm = NaN;
            score = 0;
        }
        truthMarker = L.marker([truthLL.lat, truthLL.lng], { icon: pinIcon('truth') })
                      .bindTooltip(photo.title || 'Actual location').addTo(map);
        if (guessLatLng) {
            connector = L.polyline([[guessLatLng.lat, guessLatLng.lng], [truthLL.lat, truthLL.lng]], {
                color: '#666', weight: 2, dashArray: '4 6', interactive: false,
            }).addTo(map);
            map.fitBounds(connector.getBounds().pad(0.3));
        } else {
            map.setView([truthLL.lat, truthLL.lng], 4);
        }

        game.history.push({ photo: photo, guess: guessLatLng, distanceKm: distanceKm, score: score });
        game.state = 'revealed';

        var distStr = isFinite(distanceKm)
            ? (distanceKm < 10 ? distanceKm.toFixed(2) : distanceKm < 1000 ? distanceKm.toFixed(0) : Math.round(distanceKm).toLocaleString())
            : '—';
        var resEl = document.getElementById('geo-result');
        resEl.style.display = 'block';
        resEl.innerHTML =
            (guessLatLng ? '<strong>' + score.toLocaleString() + ' pts</strong> · ' + distStr + ' km off' : '<strong>Skipped</strong> · 0 pts');
        document.getElementById('geo-instructions').textContent =
            game.round < ROUNDS ? 'Red = actual, green = your guess.' : 'Final round complete.';
        document.getElementById('geo-skip').disabled = true;
        document.getElementById('geo-confirm').style.display = 'none';
        var nextBtn = document.getElementById('geo-next');
        nextBtn.style.display = '';
        nextBtn.textContent = (game.round < ROUNDS ? 'Next round →' : 'See results →');
        document.getElementById('geo-total-score').textContent =
            game.history.reduce((s, h) => s + h.score, 0).toLocaleString();
    }

    function endGame() {
        var total = game.history.reduce((s, h) => s + h.score, 0);
        document.getElementById('geo-final-score').textContent = total.toLocaleString();
        var bd = game.history.map((h, i) => {
            var d = isFinite(h.distanceKm) ? (h.distanceKm < 1000 ? h.distanceKm.toFixed(0) : Math.round(h.distanceKm).toLocaleString()) + ' km' : 'skipped';
            return 'Round ' + (i+1) + ': ' + String(h.score).padStart(5, ' ') + ' pts · ' + d;
        }).join('\n');
        document.getElementById('geo-final-breakdown').textContent = bd;
        document.getElementById('geo-name').value = '';
        document.getElementById('geo-save-status').textContent = '';
        document.getElementById('geo-save').disabled = false;
        savedScoreId = null;
        loadLeaderboardFromServer();
        getEnd().style.display = 'flex';
    }

    // ── Leaderboard (server-backed) ───────────────────────
    function formatDate(ms) {
        var d = new Date(ms);
        var y = d.getFullYear();
        var m = String(d.getMonth() + 1).padStart(2, '0');
        var day = String(d.getDate()).padStart(2, '0');
        return y + '-' + m + '-' + day;
    }
    function loadLeaderboardFromServer() {
        var listEl = document.getElementById('geo-lb-list');
        var metaEl = document.getElementById('geo-lb-meta');
        metaEl.textContent = '(loading…)';
        listEl.innerHTML = '<li class="geo-lb-empty">Loading…</li>';
        fetch(GEO_API + '/geo/leaderboard?limit=20')
            .then(r => r.ok ? r.json() : Promise.reject(r.status))
            .then(d => {
                var rows = d.rows || [];
                var total = d.total || 0;
                metaEl.textContent = '(' + total + ' game' + (total === 1 ? '' : 's') + ' played)';
                if (rows.length === 0) {
                    listEl.innerHTML = '<li class="geo-lb-empty">No scores yet — be the first.</li>';
                    return;
                }
                listEl.innerHTML = rows.map((e) => {
                    var cls = (e.id === savedScoreId) ? ' class="geo-lb-self"' : '';
                    return '<li' + cls + '>' + escapeHtml(e.name) + ' — '
                         + Number(e.score).toLocaleString() + ' pts '
                         + '<span style="color:#aaa; font-size:0.8em;">' + formatDate(e.created_at) + '</span></li>';
                }).join('');
            })
            .catch(() => {
                metaEl.textContent = '(failed to load)';
                listEl.innerHTML = '<li class="geo-lb-empty">Couldn\'t load leaderboard.</li>';
            });
    }
    function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, (c) => ({
            '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
        }[c]));
    }

    // ── Map click handler ────────────────────────────────
    map.on('click', function (e) {
        if (!game) return;
        if (game.state !== 'guessing' && game.state !== 'placed') return;
        // Place or move the guess pin; commit only on Confirm.
        if (guessMarker) {
            guessMarker.setLatLng(e.latlng);
        } else {
            guessMarker = L.marker(e.latlng, { icon: pinIcon('guess') })
                          .bindTooltip('Your guess').addTo(map);
        }
        game.pendingGuess = e.latlng;
        game.state = 'placed';
        document.getElementById('geo-confirm').style.display = '';
        document.getElementById('geo-instructions').textContent = 'Click again to move the pin, or hit Confirm.';
    });

    // ── Buttons ──────────────────────────────────────────
    document.getElementById('lm-mode-browse').addEventListener('click', () => setMode('browse'));
    document.getElementById('lm-mode-guess').addEventListener('click', () => setMode('guess'));

    document.getElementById('geo-skip').addEventListener('click', () => {
        if (!game || (game.state !== 'guessing' && game.state !== 'placed')) return;
        revealRound(null);
    });
    document.getElementById('geo-confirm').addEventListener('click', () => {
        if (!game || game.state !== 'placed' || !game.pendingGuess) return;
        revealRound(game.pendingGuess);
    });
    document.getElementById('geo-next').addEventListener('click', () => {
        if (!game || game.state !== 'revealed') return;
        if (game.round < ROUNDS) nextPhoto();
        else endGame();
    });
    document.getElementById('geo-save').addEventListener('click', () => {
        var nm = document.getElementById('geo-name').value.trim().slice(0, 20);
        var statusEl = document.getElementById('geo-save-status');
        if (!nm) { statusEl.textContent = 'Enter a name first.'; return; }
        var total = game.history.reduce((s, h) => s + h.score, 0);
        var breakdown = game.history.map(h => ({
            dist: isFinite(h.distanceKm) ? Math.round(h.distanceKm * 1000) / 1000 : null,
            score: h.score,
        }));
        var btn = document.getElementById('geo-save');
        btn.disabled = true;
        statusEl.textContent = 'Saving…';
        fetch(GEO_API + '/geo/score', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: nm, score: total, breakdown: breakdown }),
        })
        .then(r => r.json().then(d => ({ ok: r.ok, d: d })))
        .then(res => {
            if (!res.ok) {
                statusEl.textContent = 'Failed: ' + (res.d.error || 'unknown');
                btn.disabled = false;
                return;
            }
            savedScoreId = res.d.id;
            statusEl.textContent = 'Saved · rank #' + res.d.rank + ' globally.';
            loadLeaderboardFromServer();
        })
        .catch(() => {
            statusEl.textContent = 'Network error.';
            btn.disabled = false;
        });
    });
    document.getElementById('geo-restart').addEventListener('click', () => {
        document.getElementById('geo-save').disabled = false;
        startGame();
    });
    document.getElementById('geo-quit').addEventListener('click', () => {
        document.getElementById('geo-save').disabled = false;
        setMode('browse');
    });
});
</script>
